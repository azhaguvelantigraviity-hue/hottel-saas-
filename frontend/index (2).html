const Badge = ({children,color='gold'}) => {
  const colors = {
    gold:'background:rgba(201,168,76,0.15);color:#C9A84C;border:1px solid rgba(201,168,76,0.3)',
    teal:'background:rgba(45,212,191,0.15);color:#2DD4BF;border:1px solid rgba(45,212,191,0.3)',
    rose:'background:rgba(251,113,133,0.15);color:#FB7185;border:1px solid rgba(251,113,133,0.3)',
    violet:'background:rgba(167,139,250,0.15);color:#A78BFA;border:1px solid rgba(167,139,250,0.3)',
    green:'background:rgba(52,211,153,0.15);color:#34D399;border:1px solid rgba(52,211,153,0.3)',
    gray:'background:rgba(110,106,98,0.15);color:#B8B4AA;border:1px solid rgba(110,106,98,0.3)',
    amber:'background:rgba(252,211,77,0.15);color:#FCD34D;border:1px solid rgba(252,211,77,0.3)',
  };
  return <span style={{...Object.fromEntries((colors[color]||colors.gray).split(';').map(s=>{const[k,v]=s.split(':');return[k?.trim().replace(/-./,m=>m[1].toUpperCase()),v?.trim()]})),padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:'600',letterSpacing:'0.04em',whiteSpace:'nowrap'}}>{children}</span>;
};

const StatCard = ({icon,iconColor,label,value,sub,trend}) => (
  <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'20px',position:'relative',overflow:'hidden'}}>
    <div style={{position:'absolute',top:0,right:0,width:'80px',height:'80px',background:`radial-gradient(circle at 70% 30%, ${iconColor}18, transparent 70%)`,pointerEvents:'none'}}/>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'12px'}}>
      <div style={{width:'40px',height:'40px',borderRadius:'10px',background:`${iconColor}18`,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <Icon name={icon} size={18} color={iconColor}/>
      </div>
      {trend!==undefined && <div style={{display:'flex',alignItems:'center',gap:'4px',color:trend>=0?'var(--green)':'var(--rose)',fontSize:'12px',fontWeight:'600'}}>
        <span>{trend>=0?'↑':'↓'}{Math.abs(trend)}%</span>

// ── HOTEL APP ─────────────────────────────────────────────────────────────────
const HotelApp = ({onLogout}) => {
  const [page,setPage] = useState('dashboard');
  const plan = 'enterprise'; // demo: change to 'starter' or 'professional' to test locks

  const planFeatures = {
    starter:['dashboard','rooms','bookings','reports','settings'],
    professional:['dashboard','rooms','bookings','guests','employees','housekeeping','restaurant','maintenance','channel','reports','settings'],
    enterprise:['dashboard','rooms','bookings','guests','employees','housekeeping','restaurant','maintenance','channel','reports','revenue','settings'],
  };
  const allowed = planFeatures[plan]||planFeatures.starter;

  const titles = {dashboard:'Dashboard',rooms:'Room Management',bookings:'Bookings',guests:'Guest CRM',employees:'Employee Management',housekeeping:'Housekeeping',restaurant:'Restaurant POS',maintenance:'Maintenance',channel:'Channel Manager',reports:'Reports & Analytics',revenue:'Revenue AI',settings:'Settings'};
  const icons = {guests:'crm',restaurant:'food',maintenance:'maintenance',channel:'channel',housekeeping:'key',revenue:'revenue'};
  const reqPlans = {guests:'professional',employees:'professional',housekeeping:'professional',restaurant:'professional',maintenance:'professional',channel:'professional',revenue:'enterprise'};

  const getPage = () => {
    if(!allowed.includes(page)) return <LockedPage feature={titles[page]} requiredPlan={reqPlans[page]||'professional'} onNav={setPage}/>;
    switch(page){
      case 'dashboard': return <HotelDashboard plan={plan}/>;
      case 'rooms': return <RoomsPage/>;
      case 'employees': return <EmployeesPage/>;
      case 'reports': return <ReportsPage/>;
      case 'settings': return <SettingsPage role="hotel" plan={plan} onNav={setPage}/>;
      default: return <ComingSoon title={titles[page]||page} icon={icons[page]||'hotel'} color="var(--gold)"/>;
    }
  };

  return (
    <div style={{display:'flex',height:'100vh',background:'var(--obsidian)'}}>
      <Sidebar role="hotel" active={page} onNav={setPage} onLogout={onLogout} plan={plan}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <Topbar title={titles[page]||'Hotel'} subtitle="The Grand Meridian — Enterprise Plan" role="hotel"/>
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {getPage()}
        </div>
      </div>
    </div>
  );
};

// ── ROOT ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [screen,setScreen] = useState('landing'); // landing | login-admin | login-hotel | admin | hotel

  return (
    <>
      {screen==='landing' && <Landing onLogin={type=>setScreen(`login-${type}`)}/>}
      {screen==='login-admin' && <Login type="admin" onSuccess={()=>setScreen('admin')} onBack={()=>setScreen('landing')}/>}
      {screen==='login-hotel' && <Login type="hotel" onSuccess={()=>setScreen('hotel')} onBack={()=>setScreen('landing')}/>}
      {screen==='admin' && <AdminApp onLogout={()=>setScreen('landing')}/>}
      {screen==='hotel' && <HotelApp onLogout={()=>setScreen('landing')}/>}
    </>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
